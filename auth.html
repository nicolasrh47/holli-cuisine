<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - HOLLI</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f4f6f8; font-family: sans-serif; }
        .auth-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; box-sizing: border-box; }
        .auth-card h2 { text-align: center; margin-bottom: 10px; color: #333; }
        .auth-card p { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .input-group label { margin-bottom: 5px; font-size: 14px; color: #666; }
        .input-group input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        .btn-submit { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .footer-links { margin-top: 20px; text-align: center; font-size: 13px; }
        .footer-links a { color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>HOLLI</h2>
        <p>Connectez-vous pour retrouver votre foyer.</p>
        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Adresse email</label>
                <input type="email" id="email" required placeholder="mon@email.com">
            </div>
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Se connecter</button>
        </form>
    </div>
    <div class="footer-links">
        <a href="Privacy.html">Politique de confidentialité</a>
    </div>
    <script>
        function handleLogin(event) {
            event.preventDefault();
            localStorage.setItem('holli_user', document.getElementById('email').value);
            if (!localStorage.getItem('holli_profile')) {
                window.location.href = 'onboarding.html';
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
