<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - HOLLI</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f4f6f8; font-family: sans-serif; }
        .auth-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; box-sizing: border-box; text-align: center; }
        .auth-card h2 { margin-bottom: 10px; color: #333; }
        .auth-card p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .btn-submit { display: block; width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; text-decoration: none; box-sizing: border-box; }
        .btn-submit:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>HOLLI</h2>
        <p>Mode test : accède directement à l'application.</p>
        <a href="index.html" class="btn-submit">Accéder à l'application</a>
    </div>
</body>
</html>
